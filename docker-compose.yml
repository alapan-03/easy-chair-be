version: "3.9"

services:
  api:
    build: .
    container_name: node_api
    env_file:
      - .env
    depends_on:
      - mongo_db
      - redis
    restart: unless-stopped

  worker:
    build: .
    container_name: node_worker
    command: node src/workers/aiWorker.js
    env_file:
      - .env
    depends_on:
      - mongo_db
      - redis
    restart: unless-stopped

  mongo_db:
    image: mongo:7
    container_name: mongo_db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: easychair-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  mongo_data:
  redis-data:
